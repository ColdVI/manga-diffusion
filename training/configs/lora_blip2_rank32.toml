[general]
enable_bucket = true
shuffle_caption = true
caption_extension = ".txt"
keep_tokens = 1

[dataset]
resolution = 768
batch_size = 1

[[datasets]]
image_dir = "data/train_set/blip2/10_gknoir"
caption_extension = ".txt"
num_repeats = 10

[network]
network_module = "networks.lora"
network_dim = 32
network_alpha = 16

[optimizer]
optimizer_type = "AdamW8bit"
learning_rate = 1e-4
lr_scheduler = "cosine_with_restarts"
lr_warmup_steps = 100

[training]
max_train_steps = 2000
save_every_n_steps = 500
mixed_precision = "fp16"
xformers = true
seed = 42

[logging]
log_with = "wandb"
wandb_run_name = "blip2-rank32"

[model]
pretrained_model_name_or_path = "stabilityai/stable-diffusion-xl-base-1.0"
vae = "madebyollin/sdxl-vae-fp16-fix"
